<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Treinos</title>
</head>

<body>
    <header>
        <nav id="cabecalho" class="bg-neutral-primary sticky w-full z-20 top-0 start-0 border-b border-default">
            <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
                <a href="../html/home.html" class="flex items-center space-x-3 rtl:space-x-reverse">
                    <img src="../img/MoveUPSoloWhite.png" class="h-10" alt="Flowbite Logo" />
                </a>

                <div class="hidden w-full md:block md:w-auto" id="navbar-default">
                    <ul
                        class="flex flex-col font-medium p-4 md:p-0 mt-4 border border-default rounded-base bg-neutral-secondary-soft md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-neutral-primary ">
                        <li>
                            <a href="../html/home.html"
                                class="block py-2 px-3 text-white bg-brand rounded md:bg-transparent md:text-fg-brand md:p-0 hover:text-cyan-500"
                                aria-current="page">Home</a>
                        </li>
                        <li>
                            <a href="../html/treinos.html"
                                class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent hover:text-cyan-500">Treinos</a>
                        </li>
                        <li>
                            <a href="../html/estatisticas.html"
                                class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent hover:text-cyan-500">Estatísticas</a>
                        </li>
                        <li>
                            <a href="../html/perfil.html"
                                class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent hover:text-cyan-500">Perfil</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>

        <section>

            <h2 class="flex justify-center text-3xl p-5 mx-auto">QUESTIONARIO 🔍</h2>

            <div class="flex items-center justify-center min-h-screen">
                
                <form class="max-w-2xl w-full p-4 text-white" id="form-questionario">

                    <span class="block mb-4 text-2xl font-medium text-heading">Qual seu objetivo</span>

                    <div class="flex items-center justify-center gap-4 flex-wrap">

                        <label class="cursor-pointer h-full">
                            <input id="input-objetivo" type="radio" name="objetivo" value=0 class="peer sr-only" required>

                            <div
                                class="w-40 h-52 flex flex-col p-3 bg-neutral-secondary-medium border border-default-medium rounded-base shadow-xs transition-all hover:bg-neutral-secondary-dark peer-checked:border-brand peer-checked:ring-2 peer-checked:ring-brand peer-focus:ring-2 peer-focus:ring-brand">

                                <img src="../img/Barra 2.png" alt="Capa personagem fazendo barra"
                                    class="w-full h-32 object-cover rounded-sm mb-3">

                                <span class="mt-auto text-sm font-medium text-heading text-center">
                                    Ganho de massa muscular
                                </span>
                            </div>
                        </label>

                        <label class="cursor-pointer h-full">
                            <input id="input-objetivo" type="radio" name="objetivo" value="1" class="peer sr-only">

                            <div
                                class="w-40 h-52 flex flex-col p-3 bg-neutral-secondary-medium border border-default-medium rounded-base shadow-xs transition-all hover:bg-neutral-secondary-dark peer-checked:border-brand peer-checked:ring-2 peer-checked:ring-brand peer-focus:ring-2 peer-focus:ring-brand">

                                <img src="../img/Abdominal.png" alt="Capa personagem fazendo Abdominal"
                                    class="w-full h-32 object-cover rounded-sm mb-3">

                                <span class="mt-auto text-sm font-medium text-heading text-center">
                                    Emagrecimento
                                </span>
                            </div>
                        </label>

                        <label class="cursor-pointer h-full">
                            <input id="input-objetivo" type="radio" name="objetivo" value="2" class="peer sr-only">

                            <div
                                class="w-40 h-52 flex flex-col p-3 bg-neutral-secondary-medium border border-default-medium rounded-base shadow-xs transition-all hover:bg-neutral-secondary-dark peer-checked:border-brand peer-checked:ring-2 peer-checked:ring-brand peer-focus:ring-2 peer-focus:ring-brand">

                                <img src="../img/Agachamento.png" alt="Capa personagem fazendo Agachamento"
                                    class="w-full h-32 object-cover rounded-sm mb-3">

                                <span class="mt-auto text-sm font-medium text-heading text-center">
                                    Força
                                </span>
                            </div>
                        </label>

                        <label class="cursor-pointer h-full">
                            <input id="input-objetivo" type="radio" name="objetivo" value="3" class="peer sr-only">

                            <div
                                class="w-40 h-52 flex flex-col p-3 bg-neutral-secondary-medium border border-default-medium rounded-base shadow-xs transition-all hover:bg-neutral-secondary-dark peer-checked:border-brand peer-checked:ring-2 peer-checked:ring-brand peer-focus:ring-2 peer-focus:ring-brand">

                                <img src="../img/Corrida.png" alt="Capa personagem correndo"
                                    class="w-full h-32 object-cover rounded-sm mb-3">

                                <span class="mt-auto text-sm font-medium text-heading text-center">
                                    Resistência
                                </span>
                            </div>
                        </label>

                    </div>

                    <span class="block mt-8 mb-4 text-2xl font-medium text-heading">
                        Onde pretende treinar
                    </span>

                    <div class="flex items-center justify-center gap-4 flex-wrap">

                        <label class="cursor-pointer h-full">
                            <input id="input-local" type="radio" name="local" value="0" class="peer sr-only" required>

                            <div
                                class="w-40 h-52 flex flex-col p-3 bg-neutral-secondary-medium border border-default-medium rounded-base shadow-xs transition-all hover:bg-neutral-secondary-dark peer-checked:border-brand peer-checked:ring-2 peer-checked:ring-brand peer-focus:ring-2 peer-focus:ring-brand">

                                <img src="../img/treino.png" alt="Capa personagem fazendo barra"
                                    class="w-full h-32 object-cover rounded-sm mb-3">

                                <span class="mt-auto text-sm font-medium text-heading text-center">
                                    Academia
                                </span>
                            </div>
                        </label>

                        <label class="cursor-pointer h-full">
                            <input id="input-local" type="radio" name="local" value="1" class="peer sr-only">

                            <div
                                class="w-40 h-52 flex flex-col p-3 bg-neutral-secondary-medium border border-default-medium rounded-base shadow-xs transition-all hover:bg-neutral-secondary-dark peer-checked:border-brand peer-checked:ring-2 peer-checked:ring-brand peer-focus:ring-2 peer-focus:ring-brand">

                                <img src="../img/casa.png" alt="Capa personagem fazendo Abdominal"
                                    class="w-full h-32 object-cover rounded-sm mb-3">

                                <span class="mt-auto text-sm font-medium text-heading text-center">
                                    Casa
                                </span>


                            </div>
                        </label>

                    </div>

                    <span class="block mt-8 mb-4 text-2xl font-medium text-heading">
                        Qual seu estado atual
                    </span>

                    <div class="flex items-center justify-center gap-4 flex-wrap">

                        <label class="cursor-pointer h-full">
                            <input id="input-estado" type="radio" name="estado" value="0" class="peer sr-only" required>

                            <div
                                class="w-40 h-52 flex flex-col p-3 bg-neutral-secondary-medium border border-default-medium rounded-base shadow-xs transition-all hover:bg-neutral-secondary-dark peer-checked:border-brand peer-checked:ring-2 peer-checked:ring-brand peer-focus:ring-2 peer-focus:ring-brand">

                                <img src="../img/sedentario.png" alt="Capa personagem fazendo barra"
                                    class="w-full h-32 object-cover rounded-sm mb-3">

                                <span class="mt-auto text-sm font-medium text-heading text-center">
                                    Sedentario
                                </span>
                            </div>
                        </label>

                        <label class="cursor-pointer h-full">
                            <input id="input-estado" type="radio" name="estado" value="1" class="peer sr-only">

                            <div
                                class="w-40 h-52 flex flex-col p-3 bg-neutral-secondary-medium border border-default-medium rounded-base shadow-xs transition-all hover:bg-neutral-secondary-dark peer-checked:border-brand peer-checked:ring-2 peer-checked:ring-brand peer-focus:ring-2 peer-focus:ring-brand">

                                <img src="../img/mais-ou-menos.png" alt="Capa personagem fazendo Abdominal"
                                    class="w-full h-32 object-cover rounded-sm mb-3">

                                <span class="mt-auto text-sm font-medium text-heading text-center">
                                    +/- Ativo
                                </span>
                            </div>
                        </label>

                        <label class="cursor-pointer h-full">
                            <input id="input-estado" type="radio" name="estado" value="2" class="peer sr-only">

                            <div
                                class="w-40 h-52 flex flex-col p-3 bg-neutral-secondary-medium border border-default-medium rounded-base shadow-xs transition-all hover:bg-neutral-secondary-dark peer-checked:border-brand peer-checked:ring-2 peer-checked:ring-brand peer-focus:ring-2 peer-focus:ring-brand">

                                <img src="../img/corridaico2.png" alt="Capa personagem fazendo Agachamento"
                                    class="w-full h-32 object-cover rounded-sm mb-3">

                                <span class="mt-auto text-sm font-medium text-heading text-center">
                                    Ativo
                                </span>
                            </div>
                        </label>


                    </div>

                    <div class="flex items-center justify-center m-4">
                        <button type="submit"
                            class="text-black bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">Submit</button>

                    </div>


                </form>

            </div>
        </section>
    </main>
    <footer>

    </footer>
    <script src="../js/scriptQuestionario.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

</body>

</html>
