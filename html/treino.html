<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoveUP — Treino</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { poppins: ['Poppins', 'sans-serif'] },
          colors: {
            dark: '#0a1628',
            brand: '#1a4fa8',
            'brand-light': '#3a7fd4',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Poppins', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 9px; }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop-in { animation: popIn 0.5s cubic-bezier(.22,1,.36,1) forwards; }
  </style>
</head>
<body class="font-poppins bg-gray-50 min-h-screen flex flex-col">

<nav class="bg-white border-b border-gray-100 sticky top-0 z-30">
  <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="./exercicios.html" class="flex items-center gap-2 text-decoration-none">
      <img src="../img/MoveUPSolo.png"  alt="" class="w-35 h-10 rounded-lg flex items-center justify-center"> 
    </a>
    <div class="flex items-center gap-4">
      <button onclick="window.location.href='./exercicios.html'" class="flex items-center gap-2 border border-gray-200 text-dark text-sm font-semibold px-4 py-2 rounded-full hover:bg-gray-50 transition-colors cursor-pointer bg-transparent">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24">
          <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Voltar
      </button>
    </div>
  </div>
</nav>

<main class="max-w-5xl mx-auto px-4 sm:px-6 py-8 w-full flex-1 flex flex-col">
  <div id="active-view" class="grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-6 items-start w-full">
    <!-- Left Column -->
    <div class="flex flex-col gap-6">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-2">
        <div>
          <h1 class="text-2xl font-extrabold text-dark tracking-tight" id="workout-name-display"></h1>
          <p class="text-sm text-gray-400 mt-0.5" id="workout-meta-display"></p>
        </div>
        <div class="flex items-center gap-3 bg-white px-4 py-2.5 rounded-xl border border-gray-100 shadow-sm shrink-0">
          <div class="w-24 h-1.5 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full bg-brand rounded-full transition-all duration-500" id="overall-bar" style="width:0%"></div>
          </div>
          <span class="text-[12.5px] font-semibold text-gray-500" id="overall-label">0 / 0</span>
        </div>
      </div>

      <div class="bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm">
        <div class="aspect-video w-full bg-dark relative">
          <div id="video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-center gap-3">
            <div class="w-12 h-12 bg-gray-800 rounded-full flex items-center justify-center text-gray-400">
              <svg width="24" height="24" fill="none" viewBox="0 0 24 24"><path d="M15 12l-6 4V8l6 4z" fill="currentColor"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/></svg>
            </div>
            <p class="text-sm text-gray-400 font-medium">Nenhum vídeo disponível</p>
          </div>
          <iframe id="video-iframe" src="" class="absolute inset-0 w-full h-full border-none hidden" allowfullscreen></iframe>
        </div>

        <div class="p-6">
          <h2 class="text-xl font-bold text-dark mb-2" id="ex-name-display"></h2>
          <div class="inline-flex items-center bg-blue-50 text-brand text-[12px] font-semibold px-3 py-1 rounded-full mb-3" id="ex-sets-display"></div>
          <p class="text-sm text-gray-500 leading-relaxed" id="ex-desc-display"></p>
        </div>

        <div class="p-6 border-t border-gray-100 bg-gray-50/50">
          <h3 class="text-[13px] font-bold text-dark mb-3" id="set-tracker-title">Séries</h3>
          <div class="flex gap-2 flex-wrap mb-5" id="sets-row"></div>

          <div class="flex gap-2 bg-gray-100 p-1.5 rounded-xl mb-5">
            <button class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all text-dark bg-white shadow-sm" id="mode-timer" onclick="setMode('timer')">Cronômetro</button>
            <button class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all text-gray-400 hover:text-dark bg-transparent" id="mode-reps" onclick="setMode('reps')">Repetições</button>
          </div>

          <div id="timer-section">
            <div class="text-5xl font-bold text-dark text-center my-6 tracking-tight" id="timer-display" style="font-feature-settings: 'tnum';">00:00</div>
            <div class="flex gap-3 mb-5">
              <button class="flex-1 bg-brand text-white font-semibold py-3 rounded-xl hover:bg-blue-700 transition-colors" id="btn-timer-toggle" onclick="toggleTimer()">Iniciar</button>
              <button class="flex-1 bg-white border border-gray-200 text-dark font-semibold py-3 rounded-xl hover:bg-gray-50 transition-colors" onclick="resetTimer()">Zerar</button>
            </div>
          </div>

          <div id="reps-section" class="hidden">
            <div class="text-6xl font-bold text-dark text-center my-4" id="rep-display">0</div>
            <div class="flex gap-3 mb-5">
              <button class="flex-1 bg-white border border-gray-200 text-dark text-2xl font-bold py-3 rounded-xl hover:bg-gray-50 transition-colors active:scale-95" onclick="changeRep(-1)">-</button>
              <button class="flex-1 bg-white border border-gray-200 text-dark text-2xl font-bold py-3 rounded-xl hover:bg-gray-50 transition-colors active:scale-95" onclick="changeRep(1)">+</button>
            </div>
          </div>

          <button class="w-full bg-dark text-white text-[15px] font-semibold py-3.5 rounded-full hover:bg-[#060e1c] active:scale-[0.98] transition-all border-none mb-4" id="btn-complete-set" onclick="completeSerie()">Concluir série</button>
          <button class="w-full bg-green-500 text-white text-[15px] font-semibold py-3.5 rounded-full hover:bg-green-600 active:scale-[0.98] transition-all border-none mb-4 hidden" id="btn-next-ex" onclick="nextExercise()">Próximo exercício</button>

          <div class="bg-blue-50 border border-blue-100 rounded-xl p-4">
            <p class="text-[11px] font-bold text-brand uppercase tracking-wider mb-1">Dica</p>
            <p class="text-[12.5px] text-gray-600" id="tip-text"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Column -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm flex flex-col max-h-[85vh] sticky top-24">
      <div class="p-5 border-b border-gray-100 flex items-center justify-between">
        <h3 class="text-[13px] font-bold text-dark uppercase tracking-wider">Lista de Exercícios</h3>
        <span class="text-[13px] font-bold text-brand" id="side-counter"></span>
      </div>
      <div class="overflow-y-auto flex-1 p-2 space-y-1" id="exercises-sidebar"></div>
    </div>
  </div>

  <!-- Done Screen -->
  <div id="done-screen" class="hidden flex-col items-center justify-center py-20 px-6 text-center w-full max-w-2xl mx-auto m-auto">
    <div class="pop-in w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mb-6 shadow-lg">
      <svg width="42" height="32" viewBox="0 0 38 30" fill="none">
        <path d="M3 15L14 26L35 4" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="text-3xl font-extrabold text-dark mb-3 tracking-tight">Treino concluído! 🎉</h1>
    <p class="text-base text-gray-500 max-w-md mx-auto mb-10" id="done-sub"></p>
    
    <div class="flex gap-4 w-full bg-white rounded-2xl border border-gray-100 p-6 shadow-sm mb-10">
      <div class="flex-1 flex flex-col items-center border-r border-gray-100">
        <span class="text-3xl font-black text-brand mb-1" id="done-exercises">0</span>
        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Exercícios</span>
      </div>
      <div class="flex-1 flex flex-col items-center border-r border-gray-100">
        <span class="text-3xl font-black text-brand mb-1" id="done-sets">0</span>
        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Séries</span>
      </div>
      <div class="flex-1 flex flex-col items-center">
        <span class="text-3xl font-black text-brand mb-1" id="done-time">0</span>
        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Minutos</span>
      </div>
    </div>
    
    <button onclick="window.location.href='./exercicios.html'" 
      class="w-full sm:w-auto px-10 py-4 bg-dark text-white text-[15px] font-semibold rounded-full hover:bg-[#060e1c] active:scale-[0.98] transition-all border-none">
      Voltar aos treinos
    </button>
  </div>
</main>

<script>
const PREDEFINED_VIDEOS = {
  'Supino reto (barra)': 'rT7DgCr-3pg',
  'Flexão de braços': 'IODxDxX7oi4',
  'Agachamento c/ barra': 'MVMNK0ncDPk',
  'Agachamento livre': 'MVMNK0ncDPk',
  'Barra fixa': 'eGo4IYcbEPI',
  'Prancha': 'pSHjTRCQxIw',
  'Desenvolvimento militar': '2yjwXTZep3c',
  'Rosca direta c/ barra': 'ykJmrZ5v0Oo',
  'Tríceps corda no cabo': 'vB5OHsJ3EME',
  'Hip thrust c/ barra': 'xDoeTWA2ttM'
};

const SETS_CONFIG = { hipertrofia: 4, forca: 5, resistencia: 3, queima: 3 };
const REPS_CONFIG = {
  hipertrofia: '10-12 reps',
  forca: '4-6 reps',
  resistencia: '15-20 reps',
  queima: '15 reps'
};
const TIPS = [
  'Mantenha a respiracao controlada durante todo o movimento.',
  'Foque na contracao muscular no pico da tensao.',
  'Controle a fase de descida — o movimento excentrico e crucial.',
  'Mantenha a coluna neutra durante o exercicio.',
  'Hidrate-se entre as series para manter o desempenho.',
  'Mantenha os joelhos alinhados com os pes durante agachamentos.',
  'Evite usar momentum — priorize a qualidade do movimento.',
  'Respire fundo antes de iniciar o movimento principal.',
];
const EX_DESCRIPTIONS = {
  'Supino reto (barra)': 'Deite no banco com os pes apoiados no chao. Segure a barra com pegada um pouco mais larga que os ombros. Desca a barra ate tocar levemente o peito e empurre de volta ao ponto inicial, contraindo o peitoral.',
  'Flexao de bracos': 'Em posicao de prancha alta, maos ligeiramente mais largas que os ombros. Desca o corpo ate o peito quase tocar o chao, mantendo o corpo reto. Empurre de volta com forca, expirando no esforco.',
  'Agachamento c/ barra': 'Posicione a barra sobre os trapezios. Com os pes na largura dos ombros, desca ate as coxas ficarem paralelas ao chao. Mantenha o peito erguido, joelhos alinhados com os pes e a coluna neutra.',
  'Barra fixa': 'Segure a barra com pegada prona, maos um pouco mais largas que os ombros. Puxe o corpo para cima ate o queixo ultrapassar a barra. Desca de forma controlada ate os cotovelos ficarem completamente estendidos.',
  'Desenvolvimento militar': 'Sentado ou em pe, segure os halteres ou barra na altura dos ombros. Empurre para cima ate os bracos ficarem quase estendidos, sem travar os cotovelos. Desca de forma controlada.',
  'Rosca direta c/ barra': 'Em pe, segure a barra com pegada supinada na largura dos ombros. Mantendo os cotovelos fixos ao lado do corpo, flexione os antebracos ate a barra chegar na altura dos ombros. Desca de forma controlada.',
  'Triceps corda no cabo': 'Posicione-se de frente para o cabo alto. Segure a corda com as duas maos, cotovelos dobrados a 90 graus. Extenda os antebracos para baixo abrindo a corda no final do movimento. Controle na subida.',
  'Hip thrust c/ barra': 'Apoia os ombros num banco, barra sobre o quadril. Com os pes apoiados no chao, empurre o quadril para cima contraindo os gluteos no topo. Desca lentamente e repita.',
  'Prancha': 'Apoie os antebracos no chao com os cotovelos abaixo dos ombros. Mantenha o corpo em linha reta da cabeca aos pes, contraindo o abdomen e gluteos. Respire normalmente durante o tempo estipulado.',
};

function getDesc(name) {
  return EX_DESCRIPTIONS[name] || 'Execute o movimento com amplitude completa, controlando tanto a fase concentrica quanto a excentrica. Mantenha a postura correta durante toda a execucao para maximizar os resultados e prevenir lesoes.';
}

const params = new URLSearchParams(window.location.search);
const workoutId = params.get('id');
const currentUser = JSON.parse(localStorage.getItem('moveup_user') || '{}');

if (!currentUser.email) window.location.href = './login.html';

const workouts = JSON.parse(localStorage.getItem('moveup_workouts_' + currentUser.email) || '[]');
const workout = workouts.find(w => w.id === workoutId);

if (!workout) window.location.href = './exercicios.html';

const FOCUS_LABEL = { hipertrofia: 'Hipertrofia', forca: 'Forca', resistencia: 'Resistencia', queima: 'Queima de gordura' };
const NIVEL_LABEL = { iniciante: 'Iniciante', intermediario: 'Intermediario', avancado: 'Avancado' };

let currentExIdx = 0;
let currentMode = 'timer';
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;
let currentReps = 0;
let seriesTotal = 0;
let seriesDone = 0;
let completedSeries = [];
let workoutStartTime = Date.now();
let totalSeriesCompleted = 0;

function initPage() {
  document.getElementById('workout-name-display').textContent = workout.name;
  document.getElementById('workout-meta-display').textContent =
    `${FOCUS_LABEL[workout.foco] || workout.foco} · ${workout.duracao} min · ${NIVEL_LABEL[workout.nivel] || workout.nivel}`;

  seriesTotal = SETS_CONFIG[workout.foco] || 3;
  completedSeries = workout.exercises.map(() => 0);

  renderSidebar();
  loadExercise(0);
  updateOverall();
}

function renderSidebar() {
  const container = document.getElementById('exercises-sidebar');
  container.innerHTML = workout.exercises.map((ex, i) => {
    const done = completedSeries[i] >= seriesTotal;
    const active = i === currentExIdx;
    
    let classes = "flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-colors border border-transparent";
    let numClasses = "w-7 h-7 rounded-lg flex items-center justify-center text-[12px] font-bold border";
    
    if (active) {
      classes += " bg-blue-50 border-brand/20";
      numClasses += " bg-brand text-white border-brand";
    } else if (done) {
      classes += " opacity-60";
      numClasses += " bg-green-500 text-white border-green-500";
    } else {
      classes += " hover:bg-gray-50";
      numClasses += " bg-white text-gray-500 border-gray-200";
    }
    
    return `<div class="${classes}" id="sidebar-item-${i}" onclick="jumpToExercise(${i})">
      <div class="${numClasses}">${done ? '<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3 3 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : (i + 1)}</div>
      <div class="flex-1 overflow-hidden">
        <p class="text-[13px] font-semibold text-dark truncate leading-tight mb-0.5">${ex}</p>
        <p class="text-[11px] text-gray-400 font-medium">${completedSeries[i]}/${seriesTotal} séries</p>
      </div>
    </div>`;
  }).join('');
  document.getElementById('side-counter').textContent = `${completedSeries.filter((c, i) => c >= seriesTotal).length}/${workout.exercises.length}`;
}

function loadExercise(idx) {
  currentExIdx = idx;
  const name = workout.exercises[idx];

  document.getElementById('ex-name-display').textContent = name;
  document.getElementById('ex-sets-display').textContent =
    `${seriesTotal} series x ${REPS_CONFIG[workout.foco] || '12 reps'}`;
  document.getElementById('ex-desc-display').textContent = getDesc(name);
  document.getElementById('tip-text').textContent = TIPS[idx % TIPS.length];

  seriesDone = completedSeries[idx];
  currentReps = 0;
  timerSeconds = 0;
  timerRunning = false;
  clearInterval(timerInterval);

  renderSetsRow();
  updateTimerDisplay();
  updateRepDisplay();
  checkExerciseDone();
  loadVideoForExercise(name);
  renderSidebar();
  updateOverall();
}

function renderSetsRow() {
  const row = document.getElementById('sets-row');
  row.innerHTML = Array.from({ length: seriesTotal }, (_, i) => {
    let baseCls = "w-10 h-10 rounded-xl border-2 flex items-center justify-center text-[13px] font-bold transition-all";
    if (i < seriesDone) baseCls += " bg-green-500 border-green-500 text-white";
    else if (i === seriesDone) baseCls += " bg-blue-50 border-brand text-brand";
    else baseCls += " bg-transparent border-gray-200 text-gray-400";
    
    return `<div class="${baseCls}">${i + 1}</div>`;
  }).join('');
  document.getElementById('set-tracker-title').textContent =
    seriesDone >= seriesTotal ? 'Todas as séries concluídas' : `Série ${seriesDone + 1} de ${seriesTotal}`;
}

function checkExerciseDone() {
  const done = seriesDone >= seriesTotal;
  document.getElementById('btn-complete-set').classList.toggle('hidden', done);
  document.getElementById('btn-next-ex').classList.toggle('hidden', !done);
  const isLast = currentExIdx >= workout.exercises.length - 1;
  document.getElementById('btn-next-ex').textContent = isLast ? 'Finalizar treino 🎉' : 'Próximo exercício';
}

function completeSerie() {
  if (seriesDone >= seriesTotal) return;
  seriesDone++;
  completedSeries[currentExIdx] = seriesDone;
  totalSeriesCompleted++;
  timerSeconds = 0;
  timerRunning = false;
  clearInterval(timerInterval);
  currentReps = 0;
  renderSetsRow();
  updateTimerDisplay();
  updateRepDisplay();
  checkExerciseDone();
  renderSidebar();
}

function nextExercise() {
  const next = currentExIdx + 1;
  if (next >= workout.exercises.length) {
    finishWorkout();
    return;
  }
  loadExercise(next);
  const sidebar = document.getElementById('exercises-sidebar');
  const item = document.getElementById(`sidebar-item-${next}`);
  if (item) item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function jumpToExercise(idx) {
  loadExercise(idx);
}

function updateOverall() {
  const done = completedSeries.filter((c, i) => c >= seriesTotal).length;
  const total = workout.exercises.length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-label').textContent = `${done} / ${total}`;
}

function setMode(mode) {
  currentMode = mode;
  
  document.getElementById('timer-section').classList.toggle('hidden', mode !== 'timer');
  document.getElementById('reps-section').classList.toggle('hidden', mode !== 'reps');
  
  const btnTimer = document.getElementById('mode-timer');
  const btnReps = document.getElementById('mode-reps');
  
  btnTimer.className = mode === 'timer' ? 'flex-1 py-2 text-sm font-semibold rounded-lg transition-all text-dark bg-white shadow-sm' : 'flex-1 py-2 text-sm font-semibold rounded-lg transition-all text-gray-400 hover:text-dark bg-transparent';
  btnReps.className = mode === 'reps' ? 'flex-1 py-2 text-sm font-semibold rounded-lg transition-all text-dark bg-white shadow-sm' : 'flex-1 py-2 text-sm font-semibold rounded-lg transition-all text-gray-400 hover:text-dark bg-transparent';
  
  if (mode !== 'timer') { clearInterval(timerInterval); timerRunning = false; }
}

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('btn-timer-toggle').textContent = 'Retomar';
    document.getElementById('timer-display').classList.remove('text-brand');
  } else {
    timerRunning = true;
    document.getElementById('btn-timer-toggle').textContent = 'Pausar';
    document.getElementById('timer-display').classList.add('text-brand');
    timerInterval = setInterval(() => {
      timerSeconds++;
      updateTimerDisplay();
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 0;
  document.getElementById('btn-timer-toggle').textContent = 'Iniciar';
  document.getElementById('timer-display').classList.remove('text-brand');
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
  const s = String(timerSeconds % 60).padStart(2, '0');
  document.getElementById('timer-display').textContent = `${m}:${s}`;
}

function changeRep(delta) {
  currentReps = Math.max(0, currentReps + delta);
  updateRepDisplay();
}

function updateRepDisplay() {
  document.getElementById('rep-display').textContent = currentReps;
}

function loadVideoForExercise(name) {
  const vid = PREDEFINED_VIDEOS[name] || null;
  const iframe = document.getElementById('video-iframe');
  const placeholder = document.getElementById('video-placeholder');

  if (vid) {
    iframe.src = `https://www.youtube.com/embed/${vid}`;
    iframe.classList.remove('hidden');
    placeholder.classList.add('hidden');
  } else {
    iframe.src = '';
    iframe.classList.add('hidden');
    placeholder.classList.remove('hidden');
  }
}

function finishWorkout() {
  clearInterval(timerInterval);
  const elapsed = Math.round((Date.now() - workoutStartTime) / 60000);

  const key = 'moveup_history_' + currentUser.email;
  const history = JSON.parse(localStorage.getItem(key) || '[]');
  history.unshift({
    workoutId: workout.id,
    name: workout.name,
    date: new Date().toISOString(),
    exercises: workout.exercises.length,
    series: totalSeriesCompleted,
    minutes: elapsed,
  });
  localStorage.setItem(key, JSON.stringify(history.slice(0, 50)));

  document.getElementById('active-view').classList.add('hidden');
  document.getElementById('done-screen').classList.remove('hidden');
  document.getElementById('done-screen').classList.add('flex');
  document.getElementById('done-sub').textContent =
    `Você completou "${workout.name}" com sucesso. Excelente trabalho!`;
  document.getElementById('done-exercises').textContent = workout.exercises.length;
  document.getElementById('done-sets').textContent = totalSeriesCompleted;
  document.getElementById('done-time').textContent = elapsed || 1;
}

initPage();
</script>
</body>
</html>
