<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoveUP — Treino</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { poppins: ['Poppins', 'sans-serif'] },
          colors: {
            dark: '#0a1628',
            brand: '#1a4fa8',
            'brand-light': '#3a7fd4',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../css/treino.css">
</head>
<body class="font-poppins bg-gray-50 min-h-screen flex flex-col pt-16">

<!-- Fundo abstrato decorativo -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-brand/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-5%] w-[35vw] h-[35vw] bg-blue-400/10 rounded-full blur-3xl"></div>
</div>

            <!-- NAVBAR -->

      <nav class="bg-dark fixed inset-x-0 z-50 top-0 border-none">
        <div class="w-full flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="../html/homepage.html" class="flex items-center space-x-3 rtl:space-x-reverse">
                <img src="../img/MoveUPSoloWhite.png" class="h-7" alt="MoveUP Logo" />
            </a>
            <button data-collapse-toggle="navbar-default" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-white rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-white focus:outline-none focus:ring-2 focus:ring-neutral-tertiary" aria-controls="navbar-default" aria-expanded="false">
                <span class="sr-only">Open main menu</span>
                <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14"/></svg>
            </button>
            <div class="hidden w-full md:block md:w-auto" id="navbar-default">
            <ul class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-default rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary">
                <li>
                <a href="../html/homepage.html" class="block py-2 px-3 text-white bg-brand rounded md:bg-transparent md:text-fg-brand md:p-0 hover:bg-neutral-secondary-medium hover:text-cyan-500" aria-current="page">Home</a>
                </li>
                <li>
                <a href="../html/exercicios.html" class="block py-2 px-3 text-white rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent hover:bg-neutral-secondary-medium hover:text-cyan-500">Treinos</a>
                </li>
                <li>
                <a href="../html/perfil.html" class="block py-2 px-3 text-white rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent hover:bg-neutral-secondary-medium hover:text-cyan-500">Perfil</a>
                </li>
                <li>
                <a onclick="logout()" class="block py-2 px-3 text-white rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent hover:bg-neutral-secondary-medium hover:text-cyan-500 cursor-pointer">Sair</a>
                </li>
            </ul>
            </div>
        </div>
      </nav>


<main class="w-full mx-auto px-4 sm:px-6 pt-2 pb-8 w-full flex-1 flex flex-col relative z-10">
  <div id="active-view" class="grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-6 items-start w-full">
    <!-- Left Column -->
    <div class="flex flex-col gap-6">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-2">
        <div>
          <h1 class="text-2xl font-extrabold text-dark tracking-tight" id="workout-name-display"></h1>
          <p class="text-sm text-gray-400 mt-0.5" id="workout-meta-display"></p>
        </div>
        <div class="flex items-center gap-3 bg-white px-4 py-2.5 rounded-xl border border-gray-100 shadow-sm shrink-0">
          <div class="w-24 h-1.5 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full bg-brand rounded-full transition-all duration-500" id="overall-bar" style="width:0%"></div>
          </div>
          <span class="text-[12.5px] font-semibold text-gray-500" id="overall-label">0 / 0</span>
        </div>
      </div>

      <div class="bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm">
        <div class="aspect-video w-full bg-dark relative">
          <div id="video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-center gap-3">
            <div class="w-12 h-12 bg-gray-800 rounded-full flex items-center justify-center text-gray-400">
              <svg width="24" height="24" fill="none" viewBox="0 0 24 24"><path d="M15 12l-6 4V8l6 4z" fill="currentColor"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/></svg>
            </div>
            <p class="text-sm text-gray-400 font-medium">Nenhum vídeo disponível</p>
          </div>
          <iframe id="video-iframe" src="" class="absolute inset-0 w-full h-full border-none hidden" allowfullscreen></iframe>
        </div>

        <div class="p-6">
          <h2 class="text-xl font-bold text-dark mb-2" id="ex-name-display"></h2>
          <div class="inline-flex items-center bg-blue-50 text-brand text-[12px] font-semibold px-3 py-1 rounded-full mb-3" id="ex-sets-display"></div>
          <p class="text-sm text-gray-500 leading-relaxed" id="ex-desc-display"></p>
        </div>

        <div class="p-6 border-t border-gray-100 bg-gray-50/50">
          <h3 class="text-[13px] font-bold text-dark mb-3" id="set-tracker-title">Séries</h3>
          <div class="flex gap-2 flex-wrap mb-5" id="sets-row"></div>

          <div id="rep-target-section" class="hidden my-6 text-center">
            <p class="text-sm text-gray-400">Objetivo de Repetições</p>
            <p id="rep-target-display" class="text-5xl font-bold text-dark tracking-tight"></p>
          </div>

          <div id="timer-section" class="hidden">
            <div class="text-5xl font-bold text-dark text-center my-6 tracking-tight" id="timer-display" style="font-feature-settings: 'tnum';">00:00</div>
            <div class="flex gap-3 mb-5">
              <button class="flex-1 bg-brand text-white font-semibold py-3 rounded-xl hover:bg-blue-700 transition-colors" id="btn-timer-toggle" onclick="toggleTimer()">Iniciar</button>
              <button class="flex-1 bg-white border border-gray-200 text-dark font-semibold py-3 rounded-xl hover:bg-gray-50 transition-colors" onclick="resetTimer()">Zerar</button>
            </div>
          </div>

          <button class="w-full bg-dark text-white text-[15px] font-semibold py-3.5 rounded-full hover:bg-[#060e1c] active:scale-[0.98] transition-all border-none mb-4" id="btn-complete-set" onclick="completeSerie()">Concluir série</button>
          <button class="w-full bg-green-500 text-white text-[15px] font-semibold py-3.5 rounded-full hover:bg-green-600 active:scale-[0.98] transition-all border-none mb-4 hidden" id="btn-next-ex" onclick="nextExercise()">Próximo exercício</button>
        </div>
      </div>
    </div>

    <!-- Right Column -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm flex flex-col max-h-[85vh] sticky top-24">
      <div class="p-5 border-b border-gray-100 flex items-center justify-between">
        <h3 class="text-[13px] font-bold text-dark uppercase tracking-wider">Lista de Exercícios</h3>
        <span class="text-[13px] font-bold text-brand" id="side-counter"></span>
      </div>
      <div class="overflow-y-auto flex-1 p-2 space-y-1" id="exercises-sidebar"></div>
    </div>
  </div>

  <!-- Done Screen -->
  <div id="done-screen" class="hidden flex-col items-center justify-center py-20 px-6 text-center w-full max-w-2xl mx-auto m-auto">
    <div class="pop-in w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mb-6 shadow-lg">
      <svg width="42" height="32" viewBox="0 0 38 30" fill="none">
        <path d="M3 15L14 26L35 4" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="text-3xl font-extrabold text-dark mb-3 tracking-tight">Treino concluído!</h1>
    <p class="text-base text-gray-500 max-w-md mx-auto mb-10" id="done-sub"></p>
    
    <div class="flex gap-4 w-full bg-white rounded-2xl border border-gray-100 p-6 shadow-sm mb-10">
      <div class="flex-1 flex flex-col items-center border-r border-gray-100">
        <span class="text-3xl font-black text-brand mb-1" id="done-exercises">0</span>
        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Exercícios</span>
      </div>
      <div class="flex-1 flex flex-col items-center border-r border-gray-100">
        <span class="text-3xl font-black text-brand mb-1" id="done-sets">0</span>
        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Séries</span>
      </div>
      <div class="flex-1 flex flex-col items-center">
        <span class="text-3xl font-black text-brand mb-1" id="done-time">0</span>
        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Minutos</span>
      </div>
    </div>
    
    <button onclick="window.location.href='./exercicios.html'" 
      class="w-full sm:w-auto px-10 py-4 bg-dark text-white text-[15px] font-semibold rounded-full hover:bg-[#060e1c] active:scale-[0.98] transition-all border-none">
      Voltar aos treinos
    </button>
  </div>
</main>

<!-- Rest Timer Overlay -->
<div id="rest-overlay" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center text-white" style="background: rgba(10,22,40,0.9); backdrop-filter: blur(8px);">
  <p class="text-lg font-semibold text-gray-300 mb-2">Descanso</p>
  <p id="rest-timer" class="text-7xl font-black" style="font-feature-settings: 'tnum';">00:00</p>
  <button id="btn-skip-rest" class="mt-8 bg-white/10 hover:bg-white/20 text-white font-semibold py-3 px-8 rounded-full transition-all">Pular</button>
</div>

<div id="toast" class="toast"></div>

<script src="../js/treino.js" defer></script>
</body>
</html>
